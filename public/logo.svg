<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Heartbeat Icon Circle -->
  <g id="heartbeat-icon">
    <!-- Blue background circle -->
    <circle cx="130" cy="150" r="120" fill="#0052CC"/>

    <!-- Outer white circle border -->
    <circle cx="130" cy="150" r="120" fill="none" stroke="#FFFFFF" stroke-width="5"/>

    <!-- Inner white circle border -->
    <circle cx="130" cy="150" r="110" fill="none" stroke="#FFFFFF" stroke-width="3"/>

    <!-- Heartbeat/Pulse waveform - Exact match to reference -->
    <polyline points="10,150 45,150 60,120 75,180 95,150 120,150 160,40 200,240 240,150 270,150"
              fill="none" stroke="#FFFFFF" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text Group -->
  <g id="text-content">
    <!-- MedCore Text -->
    <text x="380" y="180" font-family="Inter, -apple-system, sans-serif" font-size="80" font-weight="900" fill="#FFFFFF" letter-spacing="-2">
      MedCore
    </text>

    <!-- Tagline: Crystal clear concepts -->
    <text x="380" y="240" font-family="Inter, -apple-system, sans-serif" font-size="32" font-weight="300" fill="#FFFFFF" letter-spacing="0.5">
      Crystal clear concepts
    </text>
  </g>
</svg>