name: Deploy MedCore

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e  # Exit on any error

            echo "🚀 Starting MedCore deployment..."

            # Create deployment directory if it doesn't exist
            mkdir -p /opt/medcore
            cd /opt/medcore

            # Clone or pull the repository
            if [ -d ".git" ]; then
              echo "📥 Pulling latest code..."
              git pull origin main
            else
              echo "📥 Cloning repository..."
              git clone https://github.com/${{ github.repository }}.git .
              git checkout main
            fi

            # Build Docker image (force rebuild without cache)
            echo "🔨 Building Docker image..."
            # Retry logic for Docker build (in case of temporary network issues)
            for i in {1..3}; do
              if docker build --no-cache -t medcore:latest .; then
                echo "✅ Docker build successful"
                break
              else
                if [ $i -lt 3 ]; then
                  echo "⚠️ Build attempt $i failed, retrying..."
                  sleep 10
                else
                  echo "❌ Docker build failed after 3 attempts"
                  exit 1
                fi
              fi
            done

            # Force remove old containers (handle multiple attempts)
            echo "🧹 Cleaning up old containers..."
            docker ps -a | grep -i medcore | awk '{print $1}' | xargs -r docker rm -f || true
            docker container prune -f --filter "label!=keep" || true

            # Run new container
            echo "🚀 Starting new container..."
            docker run -d \
              --name medcore \
              --restart unless-stopped \
              -p 3001:3001 \
              --health-cmd="curl -f http://localhost:3001 || exit 1" \
              --health-interval=10s \
              --health-timeout=5s \
              --health-retries=3 \
              medcore:latest

            # Wait for container to be ready
            echo "⏳ Waiting for container to start..."
            sleep 15

            # Verify deployment (check if container is running)
            if docker ps | grep -q medcore; then
              echo "✅ MedCore deployed successfully!"
              echo ""
              echo "📋 Container Status:"
              docker ps | grep medcore
              echo ""
              echo "📊 Latest Logs:"
              docker logs medcore | tail -20
            else
              echo "❌ Deployment failed - container not running"
              docker logs medcore
              exit 1
            fi
