name: Deploy MedCore

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/medcore
            git pull origin main
            docker build -t medcore .
            docker stop medcore 2>/dev/null || true
            docker rm medcore 2>/dev/null || true
            docker run -d \
              --name medcore \
              --restart unless-stopped \
              -p 3001:3001 \
              medcore
            echo "MedCore deployed successfully"
